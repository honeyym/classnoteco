# Build and push Docker image to GHCR
# Trigger: release/tag (v*) or manual dispatch
# Requires: VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY in repo Secrets for a working image
name: Docker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write  # For Trivy SARIF upload to Security tab
  id-token: write         # For cosign keyless signing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          secrets: |
            "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}"
            "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"

      - name: Sign image with cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:${{ github.ref_name }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Run Dockle
        uses: goodwithtech/dockle-action@v0.4.15
        with:
          image: 'ghcr.io/${{ github.repository }}:${{ github.ref_name }}'
          exit-code: '1'
          exit-level: 'fatal'
          # CIS-DI-0005: We use cosign for signing; DCT/Notary not used
          ignore: 'CIS-DI-0005'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
