# actionlint config - https://github.com/rhysd/actionlint
# Custom repo secrets (VITE_SUPABASE_*) trigger false positive when linter
# cannot validate keys—workflow is correct; add these in repo Settings > Secrets
paths:
  .github/workflows/**/*.{yml,yaml}:
    ignore:
      - "Context access might be invalid"
      - "Context access might be invalid.*"
